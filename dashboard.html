<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel VIP Financeiro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: rgba(30, 41, 59, 0.9); --accent: #22c55e; --text: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding: 10px; padding-bottom: 80px; }
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 90vh; }
        .login-card { background: var(--card); padding: 30px; border-radius: 24px; width: 100%; max-width: 340px; border: 1px solid rgba(255,255,255,0.1); }
        #main-content { display: none; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 12px; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .nav-item { flex: 1; text-align: center; padding: 12px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }
        .nav-item.active { background: var(--accent); color: #052e16; }
        .section { display: none; }
        .section.active { display: block; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .stat-card span { font-size: 10px; opacity: 0.6; display: block; margin-bottom: 5px; }
        .stat-card strong { font-size: 16px; color: var(--accent); }
        input { width: 100%; background: #000; border: 1px solid #334155; padding: 14px; border-radius: 12px; color: white; margin-bottom: 10px; font-size: 15px; }
        .btn { width: 100%; background: var(--accent); color: #052e16; border: none; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .fixed-saque-bar { position: fixed; bottom: 20px; left: 10px; right: 10px; z-index: 1000; display: none; }
        .btn-saque-fixed { background: #8b5cf6; color: white; box-shadow: 0 10px 20px rgba(139, 92, 246, 0.4); }
        .user-item { display: flex; flex-direction: column; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); gap: 5px; }
        .user-info { display: flex; justify-content: space-between; align-items: center; }
        .user-stats { font-size: 11px; opacity: 0.7; color: var(--accent); }
        #result-area { display: none; text-align: center; margin-top: 20px; }
        #qr-image { width: 220px; height: 220px; background: white; margin: 10px auto; border-radius: 12px; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-card">
            <h2 style="text-align: center; margin-bottom: 20px;">🔐 Painel VIP</h2>
            <input type="text" id="user" placeholder="Usuário">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn" onclick="login()">ENTRAR</button>
        </div>
    </div>

    <div id="main-content">
        <div id="saque-bar" class="fixed-saque-bar">
            <button class="btn btn-saque-fixed" onclick="solicitarSaque()">💸 SOLICITAR SAQUE (80%)</button>
        </div>

        <div class="nav-tabs">
            <div class="nav-item active" onclick="switchTab('pix', this)">💰 MEU SALDO</div>
            <div id="admin-tab" class="nav-item" style="display:none;" onclick="switchTab('users', this)">👥 GESTÃO</div>
        </div>

        <div id="pix" class="section active">
            <div class="stats-grid">
                <div class="stat-card"><span>TOTAL VENDIDO</span><strong id="stat-total">R$ 0,00</strong></div>
                <div class="stat-card"><span>SALDO (80%)</span><strong id="stat-saldo">R$ 0,00</strong></div>
            </div>
            <div class="card">
                <input type="number" id="amount" placeholder="Valor (R$)">
                <button class="btn" onclick="gerar()">GERAR PIX</button>
                <div id="result-area">
                    <img id="qr-image" src="">
                    <button class="btn" style="background:#334155; color:white; margin-top:10px;" onclick="copy()">COPIAR PIX</button>
                    <div id="pix-code" style="display:none;"></div>
                </div>
            </div>
            <button onclick="logout()" style="width:100%; background:none; border:none; color:#ef4444; margin-top:20px; font-size:11px;">Sair</button>
        </div>

        <div id="users" class="section">
            <div class="card">
                <h4 style="margin-bottom:10px;">➕ Novo Parceiro</h4>
                <input type="text" id="new-user" placeholder="Login">
                <input type="password" id="new-pass" placeholder="Senha">
                <button class="btn" onclick="addUser()">CRIAR ACESSO</button>
            </div>
            <div class="card">
                <h4 style="margin-bottom:15px;">👥 Parceiros Ativos</h4>
                <div id="user-list">Carregando...</div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = "";
        let currentSaldo = 0;

        async function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const r = await fetch('/api/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: u, password: p}) });
            const d = await r.json();
            if(d.success) {
                currentUser = u;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('saque-bar').style.display = 'block';
                if(d.role === 'admin') document.getElementById('admin-tab').style.display = 'block';
                loadStats();
            } else { alert("Dados incorretos!"); }
        }

        function logout() { location.reload(); }

        function switchTab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(id === 'users') loadUsers(); else loadStats();
        }

        async function loadStats() {
            const r = await fetch(`/api/stats/${currentUser}`);
            const d = await r.json();
            currentSaldo = d.saldo || 0;
            document.getElementById('stat-total').innerText = `R$ ${(d.total || 0).toFixed(2)}`;
            document.getElementById('stat-saldo').innerText = `R$ ${currentSaldo.toFixed(2)}`;
        }

        async function loadUsers() {
            try {
                const r = await fetch('/api/users');
                const users = await r.json();
                const list = document.getElementById('user-list');
                list.innerHTML = users.map(u => `
                    <div class="user-item">
                        <div class="user-info">
                            <strong>👤 ${u.username}</strong>
                            <button style="background:#ef4444; color:white; border:none; padding:4px 8px; border-radius:5px; font-size:10px;" onclick="delUser('${u.id}')">Remover</button>
                        </div>
                        <div class="user-stats">Vendas: R$ ${u.total_vendas.toFixed(2)} | Saldo: R$ ${u.saldo_disponivel.toFixed(2)}</div>
                    </div>
                `).join('') || "Nenhum parceiro.";
            } catch(e) { console.error(e); }
        }

        async function addUser() {
            const u = document.getElementById('new-user').value;
            const p = document.getElementById('new-pass').value;
            if(!u || !p) return;
            await fetch('/api/users/add', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: u, password: p}) });
            loadUsers();
        }

        async function delUser(id) {
            if(!confirm("Deseja remover permanentemente?")) return;
            const r = await fetch(`/api/users/${id}`, { method: 'DELETE' });
            const d = await r.json();
            if(d.success) loadUsers();
            else alert("Erro ao remover.");
        }

        async function solicitarSaque() {
            if(currentSaldo <= 0) return alert("Sem saldo.");
            const valor = prompt(`Valor para sacar? (Máx: R$ ${currentSaldo.toFixed(2)})`);
            if(!valor || isNaN(valor) || parseFloat(valor) <= 0) return;
            const chave = prompt("Chave PIX:");
            if(!chave) return;
            const r = await fetch('/api/saque', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: currentUser, valor: parseFloat(valor), pix_key: chave}) });
            const d = await r.json();
            if(d.success) alert("🚀 Solicitação enviada!");
        }

        async function gerar() {
            const val = document.getElementById('amount').value;
            if(!val) return;
            const r = await fetch('/api/gerar_pix_web', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({valor: parseFloat(val), username: currentUser}) });
            const d = await r.json();
            if(d.success) {
                document.getElementById('pix-code').innerText = d.qr_text;
                QRCode.toDataURL(d.qr_text, {width: 400, margin: 2}, (err, url) => {
                    document.getElementById('qr-image').src = url;
                    document.getElementById('result-area').style.display = 'block';
                });
            }
        }
        function copy() { navigator.clipboard.writeText(document.getElementById('pix-code').innerText); alert("Copiado!"); }
    </script>
</body>
</html>
