<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel VIP Pix 20%</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ff88; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); }
        h1 { color: var(--primary); text-align: center; margin-bottom: 30px; font-size: 24px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; opacity: 0.8; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; background: var(--primary); color: #0f172a; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 16px; }
        button:hover { filter: brightness(1.2); transform: translateY(-2px); }
        #qr-container { display: none; margin-top: 20px; text-align: center; background: white; padding: 15px; border-radius: 10px; }
        #qr-text { word-break: break-all; font-size: 10px; color: #333; margin-top: 10px; background: #f1f5f9; padding: 10px; border-radius: 5px; }
        .status-msg { text-align: center; margin-top: 15px; font-weight: 600; }
        .timer { color: #ff4757; font-weight: bold; margin-top: 10px; font-size: 18px; }
        #loading { display: none; color: var(--primary); text-align: center; margin: 20px 0; }
    </style>
</head>
<body>

<div class="card" id="login-card">
    <h1>🔑 Login Painel</h1>
    <div class="input-group">
        <label>Usuário</label>
        <input type="text" id="user" placeholder="Seu login">
    </div>
    <div class="input-group">
        <label>Senha</label>
        <input type="password" id="pass" placeholder="Sua senha">
    </div>
    <button onclick="doLogin()">Entrar no Painel</button>
</div>

<div class="card" id="main-card" style="display:none;">
    <h1>🚀 Gerar Novo PIX</h1>
    
    <div class="input-group">
        <label>Valor (R$)</label>
        <input type="number" id="valor" value="50.00">
    </div>
    
    <div class="input-group">
        <label>Método de Pagamento</label>
        <select id="metodo">
            <option value="sigilo">PIX SigiloPay (Normal)</option>
            <option value="jogo">DIRETO NO JOGO (15 Minutos)</option>
        </select>
    </div>

    <button id="btn-gerar" onclick="gerarPix()">Gerar QR Code</button>
    
    <div id="loading">⏳ Gerando PIX... Isso pode levar 30 segundos...</div>

    <div id="qr-container">
        <div id="timer-box" style="display:none;">
            <div style="color: #333; font-weight: bold;">EXPIRA EM:</div>
            <div id="timer" class="timer">15:00</div>
        </div>
        <img id="qr-img" style="width: 200px; height: 200px;">
        <div id="qr-text"></div>
        <button onclick="copyPix()" style="margin-top: 10px; background: #0f172a; color: white;">Copiar Código</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
<script>
    let AUTH = "";

    async function doLogin() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        const resp = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: u, password: p})
        });
        const data = await resp.json();
        if (data.success) {
            AUTH = btoa(u + ":" + p);
            document.getElementById('login-card').style.display = 'none';
            document.getElementById('main-card').style.display = 'block';
        } else { alert("Login Inválido"); }
    }

    async function gerarPix() {
        const valor = document.getElementById('valor').value;
        const metodo = document.getElementById('metodo').value;
        const btn = document.getElementById('btn-gerar');
        const loading = document.getElementById('loading');
        const qrContainer = document.getElementById('qr-container');

        qrContainer.style.display = 'none';
        btn.disabled = true;
        loading.style.display = 'block';

        try {
            const endpoint = metodo === 'jogo' ? '/api/gerar_pix_jogo' : '/api/gerar_pix_web';
            const resp = await fetch(endpoint, {
                method: 'POST',
                headers: {'Content-Type': 'application/json', 'Authorization': 'Basic ' + AUTH},
                body: JSON.stringify({valor: parseFloat(valor)})
            });
            const data = await resp.json();

            if (metodo === 'jogo' && data.job_id) {
                // Inicia a espera pelo robô
                checkStatus(data.job_id);
            } else if (data.success) {
                showQR(data.qr_text, false);
            } else {
                alert("Erro: " + (data.message || "Falha ao gerar"));
                resetUI();
            }
        } catch (e) {
            alert("Erro de conexão");
            resetUI();
        }
    }

    async function checkStatus(jobId) {
        const interval = setInterval(async () => {
            try {
                const resp = await fetch('/api/status_jogo/' + jobId);
                const data = await resp.json();
                
                if (data.status === 'sucesso') {
                    clearInterval(interval);
                    showQR(data.qr_text, true);
                } else if (data.status === 'erro') {
                    clearInterval(interval);
                    alert("Erro no robô: " + data.message);
                    resetUI();
                }
            } catch (e) { console.error("Erro ao checar status"); }
        }, 3000); // Pergunta a cada 3 segundos
    }

    function showQR(text, isJogo) {
        QRCode.toDataURL(text, { width: 400, margin: 2 }, function (err, url) {
            document.getElementById('qr-img').src = url;
            document.getElementById('qr-text').innerText = text;
            document.getElementById('qr-container').style.display = 'block';
            document.getElementById('loading').style.display = 'none';
            document.getElementById('btn-gerar').disabled = false;
            
            if (isJogo) {
                document.getElementById('timer-box').style.display = 'block';
                startTimer(15 * 60);
            } else {
                document.getElementById('timer-box').style.display = 'none';
            }
        });
    }

    function resetUI() {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('btn-gerar').disabled = false;
    }

    function startTimer(duration) {
        let timer = duration, minutes, seconds;
        const display = document.getElementById('timer');
        const t = setInterval(function () {
            minutes = parseInt(timer / 60, 10);
            seconds = parseInt(timer % 60, 10);
            display.textContent = (minutes < 10 ? "0" + minutes : minutes) + ":" + (seconds < 10 ? "0" + seconds : seconds);
            if (--timer < 0) { clearInterval(t); alert("PIX Expirado!"); document.getElementById('qr-container').style.display = 'none'; }
        }, 1000);
    }

    function copyPix() {
        const text = document.getElementById('qr-text').innerText;
        navigator.clipboard.writeText(text).then(() => alert("Copiado!"));
    }
</script>

</body>
</html>
