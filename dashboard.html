<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel VIP Pix 20%</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); --accent: #22c55e; --text: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; min-height: 100vh; }
        .header { margin-bottom: 24px; text-align: center; }
        .header h1 { font-size: 24px; font-weight: 700; color: var(--accent); }
        #main-content { display: none; }
        #login-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 80vh; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .stat-card { background: var(--card); padding: 16px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .stat-card span { font-size: 12px; opacity: 0.6; display: block; }
        .stat-card strong { font-size: 18px; color: var(--accent); }
        .action-card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 24px; border: 1px solid rgba(34, 197, 94, 0.2); }
        .input-group { margin-bottom: 16px; width: 100%; }
        input { width: 100%; background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; color: white; font-size: 16px; }
        .btn-generate { width: 100%; background: var(--accent); color: #052e16; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        #result-area { display: none; background: rgba(0,0,0,0.3); padding: 16px; border-radius: 12px; margin-top: 16px; text-align: center; }
        #qr-image { width: 200px; height: 200px; margin: 10px auto; display: block; border-radius: 8px; background: white; }
        .copy-btn { background: #334155; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; margin-top: 10px; cursor: pointer; }
        .loader { display: none; text-align: center; margin: 10px 0; color: var(--accent); }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="action-card" style="width: 300px;">
            <h2 style="text-align: center; margin-bottom: 20px;">🔐 Login</h2>
            <input type="text" id="user-login" placeholder="Usuário" style="margin-bottom: 10px;">
            <input type="password" id="pass-login" placeholder="Senha" style="margin-bottom: 20px;">
            <button class="btn-generate" onclick="doLogin()">ACESSAR</button>
        </div>
    </div>

    <div id="main-content">
        <div class="header"><h1>Painel Admin</h1></div>
        <div class="stats-grid">
            <div class="stat-card"><span>Vendas</span><strong id="stat-pago">0</strong></div>
            <div class="stat-card"><span>Recebido</span><strong id="stat-valor">R$ 0,00</strong></div>
        </div>

        <div class="action-card">
            <h2>🚀 Gerar PIX</h2>
            <input type="number" id="pix-amount" placeholder="Valor R$" style="margin: 15px 0;">
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;">
                <button id="btn-method-sigilo" onclick="setMethod('sigilo')" style="background: rgba(34, 197, 94, 0.2); border: 2px solid var(--accent); color: white; padding: 10px; border-radius: 12px; cursor: pointer;">🔵 SIGILO</button>
                <button id="btn-method-jogo" onclick="setMethod('jogo')" style="background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255,255,255,0.1); color: white; padding: 10px; border-radius: 12px; cursor: pointer;">🎰 JOGO</button>
            </div>

            <button class="btn-generate" id="btn-main-generate" onclick="generatePix()">GERAR AGORA</button>
            <div class="loader" id="loader">Aguarde...</div>

            <div id="result-area">
                <p style="color: var(--accent); font-weight: bold;">✅ PIX GERADO!</p>
                <img id="qr-image" src="" alt="QR Code">
                <div id="qr-text-debug" style="font-size: 9px; word-break: break-all; opacity: 0.5; margin-top: 10px; color: white;"></div>
                <button class="copy-btn" onclick="copyPix()">COPIAR CÓDIGO</button>
            </div>
        </div>
        
        <div id="financeiro-section" class="action-card">
            <h2>💰 Saque</h2>
            <button class="btn-generate" style="background:#a855f7; color:white; margin-top:10px;">SOLICITAR SAQUE</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        let AUTH_HEADER = localStorage.getItem('pix_auth');
        let currentMethod = 'sigilo';

        async function doLogin() {
            const u = document.getElementById('user-login').value;
            const p = document.getElementById('pass-login').value;
            const auth = 'Basic ' + btoa(u + ':' + p);
            AUTH_HEADER = auth;
            localStorage.setItem('pix_auth', auth);
            showMain();
        }

        function showMain() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            loadStats();
        }

        async function loadStats() {
            try {
                const r = await fetch('/api/stats');
                const d = await r.json();
                document.getElementById('stat-pago').innerText = d.pago !== undefined ? d.pago : 0;
                document.getElementById('stat-valor').innerText = `R$ ${(d.valor || 0).toFixed(2)}`;
            } catch(e) { console.error(e); }
        }

        async function generatePix() {
            const amount = document.getElementById('pix-amount').value;
            const loader = document.getElementById('loader');
            const btn = document.getElementById('btn-main-generate');
            
            btn.disabled = true; loader.style.display = 'block';
            document.getElementById('result-area').style.display = 'none';

            const endpoint = currentMethod === 'jogo' ? '/api/gerar_pix_jogo' : '/api/gerar_pix_web';
            try {
                const resp = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ valor: parseFloat(amount) })
                });
                const data = await resp.json();
                if (data.success || data.job_id) {
                    if (currentMethod === 'jogo') { checkStatusRobo(data.job_id); }
                    else { showQRCode(data.qr_text); }
                } else { alert("Erro: " + data.message); resetUI(); }
            } catch (e) { alert("Erro de conexão"); resetUI(); }
        }

        function checkStatusRobo(jobId) {
            const timer = setInterval(async () => {
                const r = await fetch('/api/status_jogo/' + jobId);
                const d = await r.json();
                if (d.status === 'sucesso') { clearInterval(timer); showQRCode(d.qr_text); }
                else if (d.status === 'erro') { clearInterval(timer); alert("Erro robô"); resetUI(); }
            }, 3000);
        }

        function showQRCode(text) {
            if (!text) { alert("Erro: Código PIX vazio"); resetUI(); return; }
            document.getElementById('qr-text-debug').innerText = text;
            QRCode.toDataURL(text, { width: 400, margin: 2 }, function (err, url) {
                if (err) { console.error(err); alert("Erro ao desenhar QR"); }
                document.getElementById('qr-image').src = url;
                document.getElementById('result-area').style.display = 'block';
                document.getElementById('loader').style.display = 'none';
                document.getElementById('btn-main-generate').disabled = false;
            });
        }

        function resetUI() { document.getElementById('loader').style.display = 'none'; document.getElementById('btn-main-generate').disabled = false; }
        function setMethod(m) { 
            currentMethod = m;
            document.getElementById('btn-method-sigilo').style.background = m === 'sigilo' ? 'rgba(34, 197, 94, 0.2)' : 'transparent';
            document.getElementById('btn-method-jogo').style.background = m === 'jogo' ? 'rgba(168, 85, 247, 0.2)' : 'transparent';
        }
        function copyPix() {
            const text = document.getElementById('qr-text-debug').innerText;
            navigator.clipboard.writeText(text);
            alert("Código Copiado!");
        }
        if (AUTH_HEADER) showMain();
    </script>
</body>
</html>
