<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel Pix 20%</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: rgba(30, 41, 59, 0.9); --accent: #22c55e; --text: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; padding: 10px; }
        
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 90vh; }
        .login-card { background: var(--card); padding: 30px; border-radius: 24px; width: 100%; max-width: 340px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        
        #main-content { display: none; padding-top: 10px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 20px; color: var(--accent); }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .stat-card span { font-size: 11px; opacity: 0.6; display: block; margin-bottom: 4px; }
        .stat-card strong { font-size: 18px; color: var(--accent); }
        
        .action-card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid rgba(34, 197, 94, 0.2); }
        input { width: 100%; background: #000; border: 1px solid #334155; padding: 14px; border-radius: 12px; color: white; margin-bottom: 15px; font-size: 16px; outline: none; }
        .btn { width: 100%; background: var(--accent); color: #052e16; border: none; padding: 16px; border-radius: 12px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.98); opacity: 0.9; }

        #result-area { display: none; margin-top: 20px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 16px; text-align: center; }
        #qr-image { width: 220px; height: 220px; background: white; margin: 15px auto; border-radius: 12px; display: block; }
        .copy-text { font-size: 10px; word-break: break-all; opacity: 0.5; margin: 10px 0; }
        .loader { display: none; color: var(--accent); text-align: center; margin: 10px 0; font-weight: 600; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-card">
            <h2 style="text-align: center; margin-bottom: 24px;">🔐 Acesso Restrito</h2>
            <input type="text" id="user" placeholder="Usuário">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn" onclick="login()">ENTRAR NO PAINEL</button>
            <p id="login-err" style="color: #ef4444; font-size: 12px; margin-top: 10px; text-align: center; display: none;">Login ou Senha incorretos!</p>
        </div>
    </div>

    <div id="main-content">
        <div class="header">
            <h1>Painel VIP</h1>
            <button onclick="location.reload()" style="background:none; border:none; color:#ef4444; font-size:12px;">Deslogar</button>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><span>VENDAS</span><strong id="stat-pago">0</strong></div>
            <div class="stat-card"><span>RECEBIDO</span><strong id="stat-valor">R$ 0,00</strong></div>
        </div>
        <div class="action-card">
            <input type="number" id="amount" placeholder="Valor do PIX (R$)">
            <button class="btn" id="btn-gen" onclick="gerar()">GERAR PIX AGORA</button>
            <div class="loader" id="loader">Processando...</div>
            <div id="result-area">
                <img id="qr-image" src="">
                <div class="copy-text" id="pix-code"></div>
                <button class="btn" style="background:#334155; color:white;" onclick="copy()">COPIAR PIX</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        async function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const r = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p})
            });
            const d = await r.json();
            if(d.success) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                loadStats();
            } else {
                document.getElementById('login-err').style.display = 'block';
            }
        }

        async function loadStats() {
            const r = await fetch('/api/stats');
            const d = await r.json();
            document.getElementById('stat-pago').innerText = d.pago || 0;
            document.getElementById('stat-valor').innerText = `R$ ${(d.valor || 0).toFixed(2)}`;
        }

        async function gerar() {
            const val = document.getElementById('amount').value;
            if(!val) return;
            document.getElementById('btn-gen').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            const r = await fetch('/api/gerar_pix_web', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({valor: parseFloat(val)})
            });
            const d = await r.json();
            if(d.success) {
                document.getElementById('pix-code').innerText = d.qr_text;
                QRCode.toDataURL(d.qr_text, {width: 400, margin: 2}, (err, url) => {
                    document.getElementById('qr-image').src = url;
                    document.getElementById('result-area').style.display = 'block';
                    document.getElementById('loader').style.display = 'none';
                });
            } else {
                alert("Erro ao gerar PIX");
                document.getElementById('btn-gen').style.display = 'block';
                document.getElementById('loader').style.display = 'none';
            }
        }

        function copy() {
            const txt = document.getElementById('pix-code').innerText;
            navigator.clipboard.writeText(txt);
            tg.HapticFeedback.notificationOccurred('success');
            alert("Código Copiado!");
        }
    </script>
</body>
</html>
