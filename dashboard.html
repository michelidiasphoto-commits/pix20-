    <!-- ABAIXO É ONDE EU ADICIONEI A LÓGICA DE ESPERA SEM MUDAR O VISUAL -->
    <script>
        // ... (Suas funções de login e stats originais) ...

        async function gerarPix() {
            const metodo = document.getElementById('metodo_pagamento').value;
            // ... (sua lógica de mostrar o loading original) ...

            try {
                const endpoint = metodo === 'jogo' ? '/api/gerar_pix_jogo' : '/api/gerar_pix_web';
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Basic ' + AUTH_TOKEN },
                    body: JSON.stringify({ valor: parseFloat(valor) })
                });
                
                const data = await response.json();
                if (metodo === 'jogo' && data.job_id) {
                    // SISTEMA DE ESPERA (POLLING)
                    iniciarEsperaRobo(data.job_id);
                } else if (data.success) {
                    showQRCode(data.qr_text);
                } else {
                    alert("Erro: " + data.message);
                }
            } catch (err) {
                alert("Erro de conexão");
            }
        }

        function iniciarEsperaRobo(jobId) {
            const check = setInterval(async () => {
                const res = await fetch('/api/status_jogo/' + jobId);
                const data = await res.json();
                if (data.status === 'sucesso') {
                    clearInterval(check);
                    showQRCode(data.qr_text, true); // true ativa o cronômetro de 15 min
                } else if (data.status === 'erro') {
                    clearInterval(check);
                    alert("Erro: " + data.message);
                }
            }, 3000);
        }
    </script>
