<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Web Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --accent: #22c55e;
            --text: #f8fafc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            padding: 20px;
            overflow-x: hidden;
            background-image: radial-gradient(circle at top right, #1e293b, transparent), 
                              radial-gradient(circle at bottom left, #064e3b, transparent);
            min-height: 100vh;
        }
        .header { margin-bottom: 24px; text-align: center; }
        .header h1 { font-size: 24px; font-weight: 700; color: var(--accent); }
        .header p { font-size: 14px; opacity: 0.7; }

        #main-content { display: none; }
        #login-screen { 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 80vh; 
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .stat-card { 
            background: var(--card); 
            backdrop-filter: blur(10px);
            padding: 16px; 
            border-radius: 16px; 
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        .stat-card span { font-size: 12px; opacity: 0.6; display: block; margin-bottom: 4px; }
        .stat-card strong { font-size: 18px; color: var(--accent); }

        .action-card {
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }
        .action-card h2 { font-size: 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        
        .input-group { margin-bottom: 16px; width: 100%; }
        .input-group label { display: block; font-size: 12px; margin-bottom: 6px; opacity: 0.8; }
        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            outline: none;
        }
        input:focus { border-color: var(--accent); }

        .btn-generate, .btn-login {
            width: 100%;
            background: var(--accent);
            color: #052e16;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-generate:active, .btn-login:active { transform: scale(0.98); }

        #result-area {
            display: none;
            background: rgba(0,0,0,0.3);
            padding: 16px;
            border-radius: 12px;
            margin-top: 16px;
            text-align: center;
        }
        #qr-image {
            width: 180px;
            height: 180px;
            margin: 10px auto;
            display: block;
            border: 8px solid white;
            border-radius: 8px;
        }
        .copy-btn {
            background: #334155;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            margin-top: 10px;
            cursor: pointer;
            width: 100%;
        }

        .loader { display: none; text-align: center; margin: 10px 0; font-size: 14px; color: var(--accent); }

        .user-list { list-style: none; margin-top: 10px; }
        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            margin-bottom: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <!-- TELA DE LOGIN -->
    <div id="login-screen">
        <div class="action-card" style="width: 300px;">
            <h2 style="justify-content: center;">🔐 Acesso Restrito</h2>
            <div class="input-group">
                <label>Usuário</label>
                <input type="text" id="user-login" placeholder="Digite seu usuário">
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="pass-login" placeholder="Digite sua senha">
            </div>
            <button class="btn-login" onclick="doLogin()">ENTRAR NO PAINEL</button>
        </div>
    </div>

    <!-- CONTEÚDO PRINCIPAL (ESCONDIDO ATÉ LOGAR) -->
    <div id="main-content">
        <div class="header">
            <h1>Painel Admin</h1>
            <p>Gerenciamento em Tempo Real</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <span>Vendas</span>
                <strong id="stat-pago">0</strong>
            </div>
            <div class="stat-card">
                <span>Total Recebido</span>
                <strong id="stat-valor">R$ 0,00</strong>
            </div>
        </div>

        <div class="action-card">
            <h2>🚀 Gerar Novo PIX</h2>
            <div class="input-group">
                <label>Valor (R$)</label>
                <input type="number" id="pix-amount" placeholder="Ex: 50.00" step="0.01">
            </div>
            <button class="btn-generate" onclick="generatePix()">GERAR PIX AGORA</button>
            
            <div class="loader" id="loader">Processando cobrança...</div>

            <div id="result-area">
                <p style="font-size: 13px; margin-bottom: 8px; color: var(--accent); font-weight: 600;">✅ PIX GERADO!</p>
                <img id="qr-image" src="" alt="QR Code">
                <code id="qr-text" style="display: none;"></code>
                <button class="copy-btn" onclick="copyPix()">COPIAR CÓDIGO PIX</button>
            </div>
        </div>

        <div id="user-management-section" style="display: none;" class="action-card">
            <h2>👥 Gestão de Parceiros</h2>
            <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; margin-bottom: 20px;">
                <p style="font-size: 13px; margin-bottom: 12px; font-weight: 600;">➕ Cadastrar Novo Acesso</p>
                <div class="input-group">
                    <input type="text" id="new-user-login" placeholder="Login do parceiro">
                </div>
                <div class="input-group">
                    <input type="text" id="new-user-pass" placeholder="Senha do parceiro">
                </div>
                <div class="input-group">
                    <label>Validade em dias (ex: 30)</label>
                    <input type="number" id="new-user-days" value="30">
                </div>
                <button class="btn-generate" onclick="createUser()">CADASTRAR PARCEIRO</button>
            </div>

            <div id="user-list-container" class="user-list">
                <p style="font-size: 12px; opacity: 0.5;">Carregando usuários...</p>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let AUTH_HEADER = localStorage.getItem('pix_auth');
        let USER_ROLE = '';

        async function doLogin() {
            const u = document.getElementById('user-login').value;
            const p = document.getElementById('pass-login').value;
            const tid = tg.initDataUnsafe?.user?.id || null; // Pega o ID do Telegram
            const auth = 'Basic ' + btoa(u + ':' + p);

            try {
                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p, telegram_id: tid })
                });
                const data = await resp.json();
                
                if (resp.ok) {
                    localStorage.setItem('pix_auth', auth);
                    AUTH_HEADER = auth;
                    USER_ROLE = data.role;
                    showMain();
                } else {
                    tg.showAlert("Usuário ou senha incorretos ou expirados!");
                }
            } catch (e) {
                tg.showAlert("Erro ao conectar.");
            }
        }

        function showMain() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            
            // Só mostra gestão se for Master
            if (USER_ROLE === 'master') {
                document.getElementById('user-management-section').style.display = 'block';
                loadUsers();
            }

            loadStats();
            setInterval(loadStats, 5000);
            if (USER_ROLE === 'master') setInterval(loadUsers, 10000);
        }

        async function loadStats() {
            try {
                const resp = await fetch('/api/stats', { headers: { 'Authorization': AUTH_HEADER } });
                if (resp.status === 401) return logout();
                const data = await resp.json();
                document.getElementById('stat-pago').innerText = data.pago;
                document.getElementById('stat-valor').innerText = `R$ ${data.valor.toFixed(2)}`;
            } catch (e) { console.error(e); }
        }

        async function loadUsers() {
            try {
                const resp = await fetch('/api/users', { headers: { 'Authorization': AUTH_HEADER } });
                if (resp.status === 401) return;
                const data = await resp.json();
                const container = document.getElementById('user-list-container');
                
                if (data.users && data.users.length > 0) {
                    container.innerHTML = data.users.map(u => {
                        const exp = new Date(u.expira_em).toLocaleDateString('pt-BR');
                        return `
                            <div class="user-item">
                                <div style="display: flex; flex-direction: column;">
                                    <span style="font-weight: 600;">${u.login}</span>
                                    <span style="font-size: 11px; opacity: 0.6;">Expira: ${exp}</span>
                                </div>
                                <button onclick="deleteUser('${u.login}')" style="background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 6px; font-size: 11px; cursor: pointer;">Excluir</button>
                            </div>
                        `;
                    }).join('');
                } else {
                    container.innerHTML = '<p style="font-size: 12px; opacity: 0.5;">Nenhum usuário liberado.</p>';
                }
            } catch (e) { console.error(e); }
        }

        async function createUser() {
            const log = document.getElementById('new-user-login').value;
            const pas = document.getElementById('new-user-pass').value;
            const day = document.getElementById('new-user-days').value;

            if (!log || !pas) return tg.showAlert("Preencha login e senha!");

            try {
                const resp = await fetch('/api/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': AUTH_HEADER },
                    body: JSON.stringify({ login: log, password: pas, validade: day })
                });
                if (resp.ok) {
                    tg.showAlert("Usuário cadastrado!");
                    loadUsers();
                }
            } catch (e) { tg.showAlert("Erro ao cadastrar."); }
        }

        async function deleteUser(login) {
            if (!confirm(`Deseja excluir ${login}?`)) return;
            try {
                const resp = await fetch(`/api/users/${login}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': AUTH_HEADER }
                });
                if (resp.ok) loadUsers();
            } catch (e) { tg.showAlert("Erro ao excluir."); }
        }

        async function generatePix() {
            const amount = document.getElementById('pix-amount').value;
            if (!amount || amount <= 0) return tg.showAlert("Valor inválido.");

            document.getElementById('loader').style.display = 'block';
            document.getElementById('result-area').style.display = 'none';

            try {
                const resp = await fetch('/api/gerar_pix_web', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': AUTH_HEADER },
                    body: JSON.stringify({ valor: parseFloat(amount) })
                });
                const data = await resp.json();
                
                if (data.success) {
                    document.getElementById('qr-text').innerText = data.qr_text;
                    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(data.qr_text)}`;
                    document.getElementById('qr-image').src = qrUrl;
                    document.getElementById('result-area').style.display = 'block';
                } else {
                    tg.showAlert("Erro: " + (data.message || "401"));
                }
            } catch (e) { tg.showAlert("Erro de conexão."); }
            finally { document.getElementById('loader').style.display = 'none'; }
        }

        function logout() {
            localStorage.removeItem('pix_auth');
            location.reload();
        }

        function copyPix() {
            const text = document.getElementById('qr-text').innerText;
            navigator.clipboard.writeText(text);
            tg.showScanQrPopup({ text: "PIX Copiado!" });
            setTimeout(() => tg.closeScanQrPopup(), 1000);
        }

        // Tenta auto-login se tiver cache
        if (AUTH_HEADER) {
            // Re-valida o role no auto-login básico
            USER_ROLE = 'master'; // Fallback ou podemos chamar /api/login de novo
            showMain();
        }
    </script>
</body>
</html>
</body>
</html>
